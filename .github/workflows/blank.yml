# 台股動能飆股篩選器 — 持續整合 (CI)
# 每次 push / PR 會編譯程式並跑離線測試，確保核心邏輯正常。
name: CI

on:
  push:
    branches: ["**"]        # 所有分支，含 claude/* 開發分支
  pull_request:
    branches: ["**"]
  workflow_dispatch:        # 也可在 Actions 分頁手動執行

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install numpy pandas requests yfinance

      - name: Compile (語法檢查)
        run: python -m py_compile tw_momentum_screener.py

      - name: Run offline tests (離線測試)
        run: python tests/test_screener.py
